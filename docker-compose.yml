version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ──────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./server/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=mongodb://mongo:27017/collabboard
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src   # hot-reload friendly in dev

  # ── Bull Workers ────────────────────────────────────────────────
  worker_email:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node src/queues/workers/emailWorker.js
    env_file: ./server/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=mongodb://mongo:27017/collabboard
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker_activity:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    command: node src/queues/workers/activityWorker.js
    env_file: ./server/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=mongodb://mongo:27017/collabboard
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Frontend ──────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data:
